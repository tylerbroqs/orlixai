name: Bug Report
description: Report a bug in Orlix
labels: [bug, needs-triage]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug!
        Please fill out as much detail as possible.

  - type: input
    id: version
    attributes:
      label: Orlix Version
      placeholder: e.g. 0.5.0-beta
    validations:
      required: true

  - type: input
    id: node
    attributes:
      label: Node.js Version
      placeholder: e.g. 20.12.0
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear description of what the bug is.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      placeholder: |
        1. Run `orlix init`
        2. Add a goal
        3. Run `orlix tick`
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behaviour
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behaviour
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Error Logs
      render: shell
